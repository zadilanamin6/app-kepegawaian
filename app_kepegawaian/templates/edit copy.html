<!DOCTYPE html>
<html>
<head>
    <title>Edit Pegawai</title>
</head>
<body>

<h2>Edit Data Pegawai</h2>

<form method="post">
    Nama: <input type="text" name="nama" value="{{ data.nama }}"><br><br>
    NIP: <input type="text" name="nip" value="{{ data.nip }}"><br><br>
    Jabatan: <input type="text" name="jabatan" value="{{ data.jabatan }}"><br><br>

    <button type="submit">Update</button>
</form>

<br>
<a href="/">Kembali</a>

</body>
</html>
